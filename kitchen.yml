---
driver:
  name: vagrant

provisioner:
  name: policyfile_zero
  product_name: cinc
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  policyfile: Policyfile.rb

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    provisioner:
      named_run_list: default
  - name: custom_template
    provisioner:
      named_run_list: custom_template
  - name: basic_site
    provisioner:
      named_run_list: basic_site
  - name: ssl
    provisioner:
      named_run_list: mod_ssl
  - name: ports
    provisioner:
      named_run_list: ports
  - name: module_template
    provisioner:
      named_run_list: module_template
  - name: php
    provisioner:
      named_run_list: php
  - name: mod_wsgi
    provisioner:
      named_run_list: wsgi
    excludes:
      - amazonlinux-2023
      - opensuse-leap-15
  - name: mod_auth_cas
    provisioner:
      named_run_list: auth_cas
    excludes:
      - almalinux-10
      - centos-stream-10
      - rockylinux-10
  - name: install_override
    provisioner:
      named_run_list: install_override
